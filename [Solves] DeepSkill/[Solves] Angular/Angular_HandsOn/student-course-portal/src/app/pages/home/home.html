<div class="home-container">
  <!-- Interpolation Binding -->
  <h2>Welcome to the {{ portalName }}</h2>

  <p>
    Your one-stop destination for managing courses, tracking progress, and accelerating your
    learning journey.
  </p>

  <div class="stats-row">
    <!-- Change this line: -->
    <div class="stat-card">
      Courses Available: <strong>{{ (courseService.getCourses() | async)?.length || 0 }}</strong>
    </div>
    <div class="stat-card">Enrolled: <strong>3</strong></div>
    <div class="stat-card">GPA: <strong>3.8</strong></div>
  </div>

  <hr />

  <!-- Two-Way Binding -->
  <div>
    <label for="search">Search Courses: </label>
    <input id="search" type="text" [(ngModel)]="searchTerm" placeholder="Type here..." />
    <p>Searching for: {{ searchTerm }}</p>
  </div>

  <!-- 
    CODE COMMENT EXPLANATION:
    [property]="value" is ONE-WAY binding. Data flows from the component class to the DOM element (e.g., disabling a button).
    [(ngModel)]="value" is TWO-WAY binding. Data flows both ways: DOM input updates the component property, and changing the property updates the DOM.
  -->

  <!-- Property and Event Binding -->
  <button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
  <p>{{ message }}</p>
</div>
