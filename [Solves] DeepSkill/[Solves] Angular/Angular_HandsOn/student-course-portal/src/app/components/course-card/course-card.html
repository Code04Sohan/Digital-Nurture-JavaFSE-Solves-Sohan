<!-- Attribute Directives: [ngClass] uses the getter, [ngStyle] calculates border colour -->
<div class="card" 
     [ngClass]="cardClasses" 
     [ngStyle]="{ 'border-left': '5px solid ' + (course.gradeStatus === 'passed' ? 'green' : course.gradeStatus === 'failed' ? 'red' : 'grey') }">
  
  <h3>{{ course.name }} ({{ course.code }})</h3>
  
  <!-- Custom Pipe Implementation -->
  <p>Credits: {{ course.credits | creditLabel }}</p>

  <!-- Structural Directive: *ngSwitch -->
  <div [ngSwitch]="course.gradeStatus">
    <span *ngSwitchCase="'passed'" class="badge passed">Passed</span>
    <span *ngSwitchCase="'failed'" class="badge failed">Failed</span>
    <span *ngSwitchCase="'pending'" class="badge pending">Pending</span>
  </div>

  <button (click)="toggleDetails()">
    {{ isExpanded ? 'Hide Details' : 'Show Details' }}
  </button>
  
  <!-- UPDATED: Dynamic Enrollment Button -->
  <button (click)="toggleEnrollment()">
    {{ isEnrolled ? 'Unenroll' : 'Enroll' }}
  </button>

  <!-- Expanded content logic -->
  <div *ngIf="isExpanded" class="details-section">
    <p>Additional course curriculum details will go here.</p>
  </div>
</div>
