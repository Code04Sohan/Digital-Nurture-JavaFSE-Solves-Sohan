<div class="card">
  <h3>{{ course.name }} ({{ course.code }})</h3>
  <p>Credits: {{ course.credits | creditLabel }}</p>

  <button (click)="toggleDetails()">{{ isExpanded ? 'Hide' : 'Show' }} Details</button>

  <!-- UI dynamically reacts to the Store via the async pipe -->
  <button (click)="toggleEnrollment()">
    {{ (isEnrolled$ | async) ? 'Unenroll' : 'Enroll' }}
  </button>

  <div *ngIf="isExpanded" class="details-section">
    <p>Additional course details...</p>
  </div>
</div>
