<div class="list-container">
  <h2>Available Courses</h2>
  
  <div *ngIf="error$ | async as errorMsg" style="color: red;">
    {{ errorMsg }}
  </div>

  <p *ngIf="loading$ | async">Loading courses... Please wait.</p>

  <div class="card-grid" *ngIf="(loading$ | async) === false">
    <!-- Render using the async pipe directly from the Store -->
    <div *ngFor="let course of (courses$ | async)">
      <app-course-card [course]="course"></app-course-card>
    </div>
  </div>
</div>
